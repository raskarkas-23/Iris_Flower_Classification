<!DOCTYPE html>
<html>
<head>
    <title>Iris Flower Classification</title>

  <style>

body {
    font-family: Arial;
    text-align: center;

    /* Floral Background */
    background-image: url("{{ url_for('static', filename='floral_bg.jpg') }}");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
}

/* Inner Box */
.container {
    background: rgba(255, 255, 255, 0.92);
    width: 420px;
    margin: auto;
    margin-top: 60px;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
   backdrop-filter:blur(8px);
}

input {
    width: 85%;
    padding: 10px;
    margin: 10px;
}

button {
    padding: 10px 22px;
    background-color: #2e8b57;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background-color: #246b45;
}

img {
    margin-top: 20px;
    border-radius: 10px;
}

</style>
</head>

<body>

<div class="container">

<h2>Iris Flower Classification </h2>

<form action="/predict" method="post">

    <input type="text" name="sepal_length"
           placeholder="Sepal Length (cm)" required><br>

    <input type="text" name="sepal_width"
           placeholder="Sepal Width (cm)" required><br>

    <input type="text" name="petal_length"
           placeholder="Petal Length (cm)" required><br>

    <input type="text" name="petal_width"
           placeholder="Petal Width (cm)" required><br>

    <button type="submit">Predict Species</button>

</form>

<h3>{{ prediction_text }}</h3>

{% if image_file %}
    <img src="{{ url_for('static', filename=image_file) }}"
         width="300">
{% endif %}

</div>

</body>
</html>
